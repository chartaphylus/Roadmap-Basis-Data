<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencapaian Produk Basis Data (SupaBase) - V2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .toggle-version {
            margin-top: 30px;
            display: inline-flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active {
            background: var(--supa-bg-card);
            color: var(--supa-green);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(62, 207, 142, 0.3);
        }

        .toggle-btn:hover:not(.active) {
            color: white;
        }

        /* Model Grid Estetik Gelap untuk Versi 2 Supabase */
        .achievement-section {
            width: 100%;
            padding: 20px 0 80px 0;
        }

        .achievement-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .achievement-card {
            background: var(--supa-bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 0;
            text-align: left;
            border: 1px solid rgba(62, 207, 142, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s forwards;
            display: flex;
            align-items: stretch;
        }

        .achievement-card.image-right {
            flex-direction: row-reverse;
        }

        .achievement-card:hover {
            transform: translateY(-10px);
            border-color: rgba(62, 207, 142, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(62, 207, 142, 0.1);
        }

        .achievement-icon {
            font-size: 3rem;
            color: var(--supa-green);
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 8px 10px rgba(62, 207, 142, 0.3));
        }

        .achievement-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #FFF;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .achievement-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .result-list {
            list-style: none;
            padding: 0;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            border-left: 4px solid var(--supa-green);
        }

        .result-list li {
            font-size: 0.9rem;
            color: #ededed;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.4;
            font-weight: 500;
        }

        .result-list li:last-child {
            margin-bottom: 0;
        }

        .result-list i {
            margin-top: 3px;
            color: var(--supa-green);
            font-size: 1rem;
        }

        .achievement-content {
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Gaya Khusus Area Gambar Project Supabase */
        .project-image-box {
            position: relative;
            width: 45%;
            min-width: 320px;
            background: repeating-linear-gradient(45deg, #0d0d0d, #0d0d0d 10px, #151515 10px, #151515 20px);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid rgba(62, 207, 142, 0.15);
        }

        .achievement-card.image-right .project-image-box {
            border-right: none;
            border-left: 1px solid rgba(62, 207, 142, 0.15);
        }

        .project-image {
            width: 90%;
            height: 90%;
            object-fit: contain;
            transition: transform 0.5s ease;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            border-radius: 8px;
            opacity: 0.95;
        }

        .achievement-card:hover .project-image {
            transform: scale(1.05) translateY(-5px);
            opacity: 1;
        }

        .project-author {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--supa-green);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(62, 207, 142, 0.3);
            z-index: 10;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 850px) {

            .achievement-card,
            .achievement-card.image-right {
                flex-direction: column;
            }

            .project-image-box {
                width: 100%;
                min-width: 100%;
                height: 250px;
                border-right: none !important;
                border-left: none !important;
                border-bottom: 1px solid rgba(62, 207, 142, 0.15);
            }

            .achievement-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header class="roadmap-header" style="margin-bottom: 40px;">
            <div class="header-icon"><i class="fas fa-database supabase-glow"></i></div>
            <h3 class="vision-text">Backend & Data Structure (Produk Akhir)</h3>
            <h1 class="title">Rangkuman Pencapaian Server</h1>
            <h2 class="subtitle">Etalase Sistem Database</h2>
            <p class="header-desc">Kumpulan mahakarya logika bisnis (*Backend*) yang akan dihasilkan siswa, merangkum
                puluhan modul teknik ke dalam piala produk sistem komersial tangguh.</p>

            <div class="toggle-version">
                <a href="index.html" class="toggle-btn"><i class="fa-solid fa-graduation-cap"></i> Pola Urutan Modul</a>
                <a href="index_v2.html" class="toggle-btn active"><i class="fa-solid fa-rocket"></i> Rangkuman Karya
                    Akhir</a>
            </div>
        </header>

        <section class="achievement-section">
            <div class="achievement-grid" id="grid-container">
                <!-- Konten digenerate dari script_v2.js -->
            </div>
        </section>
    </div>
    <script src="script_v2.js"></script>
</body>

</html>
